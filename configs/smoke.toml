experiment_name = "subfastnet_smoke"
output_dir = "outputs/subfastnet_smoke"
seed = 42
backend = "cpu"

train_roots = ["data/generated_samples1"]
val_root = "data/validation_samples"
model_variant = "tiny"

input_size = 64
short_size = 64
alignment = 32

batch_size = 2
epochs = 1
learning_rate = 0.001

validation_interval = 1
checkpoint_interval = 1
log_interval = 1

threshold_region = 0.5
threshold_kernel = 0.5
iou_threshold = 0.5

pooling_size = 9
shrink_kernel_scale = 0.1
min_kernel_width = 3
min_kernel_height = 3

augment_enabled = true
strict_dataset = false
tui_enabled = false
resume = ""

max_train_samples = 2
max_val_samples = 2
