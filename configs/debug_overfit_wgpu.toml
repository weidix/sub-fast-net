experiment_name = "subfastnet_debug_overfit_wgpu"
output_dir = "outputs/debug_overfit_wgpu_stable_decay"
seed = 42
backend = "wgpu"

train_roots = ["data/debug_train_samples"]
val_root = "data/debug_train_samples"
model_variant = "tiny"

input_size = 128
short_size = 128
alignment = 32

batch_size = 2
epochs = 40
learning_rate = 0.003
optimizer = "adam"
gradient_accumulation_steps = 1
scheduler_gamma = 0.97

validation_interval = 1
checkpoint_interval = 40
log_interval = 1

threshold_region = 0.5
threshold_kernel = 0.5
max_detection_width_ratio = 0.5
iou_threshold = 0.5

pooling_size = 9
shrink_kernel_scale = 0.5
min_kernel_width = 3
min_kernel_height = 3

scale_min = 1.0
scale_max = 1.0
aspect_min = 1.0
aspect_max = 1.0
random_horizontal_flip = false
random_rotate = false
gaussian_blur = false
augment_enabled = false
strict_dataset = true
tui_enabled = false
profiling_enabled = false
resume = ""
