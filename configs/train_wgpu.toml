experiment_name = "subfastnet_tiny_clean_labels"
output_dir = "outputs/subfastnet_tiny_wgpu_clean_labels"
seed = 42
backend = "wgpu"

train_roots = [
  "data/generated_samples1",
  "data/generated_samples2",
  "data/generated_samples3",
  "data/generated_samples4",
  "data/mixed_subtitle_samples"
]

val_root = "data/validation_samples"

model_variant = "tiny"

input_size = 256
short_size = 256
alignment = 32

batch_size = 32
epochs = 100
learning_rate = 0.001
optimizer = "adam"
gradient_accumulation_steps = 8

validation_interval = 1
checkpoint_interval = 1
log_interval = 1

threshold_region = 0.5
threshold_kernel = 0.5
iou_threshold = 0.5

pooling_size = 9
shrink_kernel_scale = 0.1
min_kernel_width = 3
min_kernel_height = 3

augment_enabled = true
strict_dataset = false
tui_enabled = true
resume = ""
